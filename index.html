<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>100개 클릭하기: 포커스 모드</title>
    <style>
        body {
            margin: 0;
            background-color: #0f172a;
            color: white;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 40px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
        }

        .stat { font-size: 18px; letter-spacing: 1px; }
        #timer { color: #fb7185; font-weight: bold; }
        #next-num { color: #38bdf8; font-size: 24px; font-weight: 800; }

        canvas { display: block; }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #overlay h1 { font-size: 40px; margin-bottom: 20px; }
        button {
            padding: 12px 35px;
            font-size: 18px;
            cursor: pointer;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            color: #0f172a;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat">TIME: <span id="timer">60</span>s</div>
        <div class="stat">TARGET: <span id="next-num">1</span></div>
    </div>

    <div id="overlay">
        <h1 id="result-title">준비되셨나요?</h1>
        <p id="result-score" style="margin-bottom: 30px; color: #94a3b8;"></p>
        <button onclick="startGame()">게임 시작</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timerEl = document.getElementById('timer');
        const nextNumEl = document.getElementById('next-num');
        const overlay = document.getElementById('overlay');
        const resultTitle = document.getElementById('result-title');
        const resultScore = document.getElementById('result-score');

        let circles = [];
        let nextToClick = 1;
        let timeLeft = 60;
        let gameActive = false;
        let timerInterval;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Circle {
            constructor(num) {
                this.num = num;
                // 낮은 숫자일수록 크기가 큼 (40px에서 12px까지 점차 감소)
                this.radius = 40 - (num * 0.25); 
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = Math.random() * (canvas.height - this.radius * 2) + this.radius;
                
                // 속도를 아주 천천히 조절 (0.5 ~ 1.2 사이)
                const speedScale = 0.8;
                this.vx = (Math.random() - 0.5) * speedScale;
                this.vy = (Math.random() - 0.5) * speedScale;
                
                this.color = "#475569"; // 모든 공의 색상을 Slate Gray로 통일
                this.clicked = false;
            }

            draw() {
                if (this.clicked) return;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                // 테두리를 살짝 주어 구분감 제공
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.closePath();

                // 숫자 텍스트 (크기에 비례하게 폰트 조절)
                ctx.fillStyle = "white";
                ctx.font = `bold ${this.radius * 0.8}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.num, this.x, this.y);
            }

            update() {
                if (this.clicked) return;
                this.x += this.vx;
                this.y += this.vy;

                if (this.x + this.radius > canvas.width || this.x - this.radius < 0) this.vx *= -1;
                if (this.y + this.radius > canvas.height || this.y - this.radius < 0) this.vy *= -1;
            }
        }

        function startGame() {
            overlay.style.display = 'none';
            circles = [];
            nextToClick = 1;
            timeLeft = 60;
            gameActive = true;
            nextNumEl.innerText = nextToClick;
            timerEl.innerText = timeLeft;

            for (let i = 1; i <= 100; i++) {
                circles.push(new Circle(i));
            }

            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) endGame(false);
            }, 1000);

            animate();
        }

        function endGame(win) {
            gameActive = false;
            clearInterval(timerInterval);
            overlay.style.display = 'flex';
            if (win) {
                resultTitle.innerText = "🏆 CLEAR!";
                resultScore.innerText = "완벽한 집중력이었습니다!";
            } else {
                resultTitle.innerText = "TIME UP";
                resultScore.innerText = `${nextToClick - 1}번까지 클릭했습니다.`;
            }
        }

        function animate() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            circles.forEach(c => {
                c.update();
                c.draw();
            });

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mousedown', (e) => {
            if (!gameActive) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // 크기가 큰 공이 아래에 깔려도 클릭될 수 있게 역순 탐색
            for (let i = circles.length - 1; i >= 0; i--) {
                let c = circles[i];
                if (c.clicked) continue;

                const dist = Math.sqrt((mouseX - c.x) ** 2 + (mouseY - c.y) ** 2);
                
                if (dist < c.radius) {
                    if (c.num === nextToClick) {
                        c.clicked = true;
                        nextToClick++;
                        nextNumEl.innerText = nextToClick;
                        if (nextToClick > 100) endGame(true);
                    }
                    break; 
                }
            }
        });

        // 시작 시 모달 띄우기
        overlay.style.display = 'flex';
        resultTitle.innerText = "1 to 100 Challenge";
        resultScore.innerText = "숫자 순서대로 클릭하세요 (낮은 숫자가 큽니다)";
    </script>
</body>
</html>
